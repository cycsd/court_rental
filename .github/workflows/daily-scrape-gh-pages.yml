name: Daily Scrape And Deploy

on:
  schedule:
    # 8:00 Asia/Taipei
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Taipei

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build runtime .env
        run: |
          cat > .env <<EOF
          VENUE_URL=https://vbs.sports.taipei/venues/?K=1042#Schedule
          TIMEZONE=Asia/Taipei
          WETNESS_PROFILE=balanced
          WETNESS_LOOKBACK_HOURS=7
          WETNESS_THRESHOLD=0.35
          WEATHER_LAT=25.086
          WEATHER_LON=121.507
          OUTPUT_JSON=output/today-status.json
          OUTPUT_HTML=output/today-status.html
          HEADLESS=true
          TELEGRAM_ENABLED=false
          EMAIL_ENABLED=false
          EOF

      - name: Generate latest status files (with retry)
        run: |
          set -o pipefail
          for attempt in 1 2 3; do
            echo "Run attempt #$attempt"
            log_file="check-today-attempt-${attempt}.log"
            npm run check:today 2>&1 | tee "$log_file"
            cmd_exit=${PIPESTATUS[0]}

            if [ "$cmd_exit" -eq 0 ] && ! grep -Fq "Next-month coverage still incomplete after retry" "$log_file"; then
              break
            fi

            if [ "$attempt" -eq 3 ]; then
              if [ "$cmd_exit" -ne 0 ]; then
                echo "check:today failed after 3 attempts"
              else
                echo "check:today kept reporting incomplete next-month coverage after 3 attempts"
              fi
              exit 1
            fi

            if [ "$cmd_exit" -ne 0 ]; then
              echo "check:today command failed, retry after 20 seconds..."
            else
              echo "Detected incomplete next-month coverage warning, retry after 20 seconds..."
            fi
            sleep 20
          done

      - name: Prepare pages content
        run: |
          mkdir -p public
          cp output/today-status.html public/today-status.html
          cp output/today-status.html public/index.html
          cp output/today-status.json public/today-status.json

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: true
